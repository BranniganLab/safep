name: code_quality

on: [push]

jobs:
  lint:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v3
      with:
        python-version: ${{ matrix.python-version }}
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint
        pip install numpy
        pip install scipy
        pip install PyYAML
        pip install .

    - name: Pylint
      run: |
        export PYLINTRC=./.github/workflows/.pylintrc
        pylint safep --fail-under=5.0
